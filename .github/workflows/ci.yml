name: QuantSolo CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: 静态守卫扫描（红线 R1/R2/R6）
        run: python tools/static_guard_scan.py
      - name: 冻结参数 SHA256 校验（红线 R3）
        run: python tools/frozen_params_check.py
      - name: ruff lint
        run: ruff check src tests tools
      - name: 点时 13 场景回归（红线 R2 底座）
        run: pytest tests/pit -q
      - name: 全量单元 + 集成（不含 live）
        run: pytest -q -m "not live"
